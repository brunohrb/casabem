name: Deploy Edge Functions

# Sobe as Edge Functions automaticamente toda vez que algo em
# supabase/functions/** muda na main. Também dá pra disparar
# manualmente pelo botão "Run workflow" na aba Actions.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:     # botão manual na aba Actions

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: egonicvreizaknzwqvbt
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy tuya-control
        run: supabase functions deploy tuya-control --project-ref $PROJECT_REF

      - name: Deploy tuya-sync
        run: supabase functions deploy tuya-sync --project-ref $PROJECT_REF

      - name: Deploy timer-worker
        run: supabase functions deploy timer-worker --project-ref $PROJECT_REF
