<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa Inteligente 🏠 — Bruno</title>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ============================================================
       VARIÁVEIS — TEMA CLARO BEM
    ============================================================ */
    :root {
      --bg:        #f0f4f8;
      --bg2:       #ffffff;
      --bg3:       #f0f4f8;
      --border:    #dde3ea;
      --text:      #1a2533;
      --text2:     #6b7a8d;
      --accent:    #1a6bb5;
      --accent2:   #1557a0;
      --green:     #27a845;
      --red:       #dc3545;
      --yellow:    #e6a817;
      --purple:    #7c5cbf;
      --orange:    #e07a20;
      --teal:      #0ea5a0;
      --radius:    14px;
      --radius-sm: 10px;
      --shadow:    0 2px 16px rgba(26,107,181,0.10);
      --shadow-md: 0 4px 24px rgba(26,107,181,0.16);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    header {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .header-left { display: flex; align-items: center; gap: 14px; }

    .logo-img {
      height: 52px;
      width: auto;
      object-fit: contain;
    }

    .header-title h1 {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.2;
      color: var(--accent2);
    }

    .header-title p {
      font-size: 12px;
      color: var(--text2);
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      background: var(--bg3);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text2);
      transition: background 0.3s;
    }

    .status-dot.online  { background: var(--green); box-shadow: 0 0 6px rgba(39,168,69,0.5); }
    .status-dot.offline { background: var(--red); }

    .stats-bar {
      display: flex;
      gap: 12px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      background: #fff;
    }

    .stat-card {
      background: linear-gradient(135deg, #f8fbff 0%, #eef4fd 100%);
      border: 1px solid #d0e2f7;
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      min-width: 130px;
      text-align: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .stat-card .val { font-size: 26px; font-weight: 800; line-height: 1; }
    .stat-card .lbl { font-size: 10px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }

    .main { display: grid; grid-template-columns: 1fr 320px; gap: 0; max-width: 1400px; margin: 0 auto; }

    @media (max-width: 960px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { border-left: none; border-top: 1px solid var(--border); position: static; max-height: none; }
    }

    @media (max-width: 600px) {
      header { padding: 8px 14px; }
      .logo-img { height: 40px; }
      .header-title h1 { font-size: 14px; }
      .stats-bar { padding: 10px 14px; gap: 8px; }
      .stat-card { min-width: 100px; padding: 10px 14px; }
      .stat-card .val { font-size: 22px; }
      .devices-panel { padding: 14px; }
      .devices-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
      .sidebar-section { padding: 14px; }
    }

    .devices-panel { padding: 24px; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; }
    .room-group { margin-bottom: 28px; }
    .room-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: var(--text); }
    .room-count { font-size: 11px; background: #e3edf8; color: var(--accent); padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .devices-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
    .device-card {
      background: #ffffff;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .device-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--border); transition: background 0.3s; }
    .device-card.on::before { background: linear-gradient(180deg, var(--green), #20c959); }
    .device-card.on { border-color: rgba(39,168,69,0.35); background: #f6fdf8; }
    .device-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: #b8d4f0; }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
    .device-icon { font-size: 26px; line-height: 1; background: var(--bg3); padding: 6px; border-radius: 10px; }

    .toggle { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: #d0d8e4; border-radius: 26px; transition: .3s; cursor: pointer; box-shadow: inset 0 1px 3px rgba(0,0,0,0.15); }
    .toggle-slider::before { content: ''; position: absolute; left: 3px; top: 3px; width: 20px; height: 20px; background: #fff; border-radius: 50%; transition: .3s; box-shadow: 0 1px 4px rgba(0,0,0,0.2); }
    .toggle input:checked + .toggle-slider { background: linear-gradient(135deg, #27a845, #20c959); box-shadow: 0 2px 8px rgba(39,168,69,0.4); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); }

    .device-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; color: var(--text); }
    .device-info { font-size: 12px; color: var(--text2); }
    .card-controls { margin-top: 12px; display: none; }
    .device-card.expanded .card-controls { display: block; }
    .control-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
    .control-label { font-size: 11px; color: var(--text2); min-width: 50px; }
    .slider { -webkit-appearance: none; appearance: none; flex: 1; height: 5px; background: #dde3ea; border-radius: 4px; outline: none; cursor: pointer; }
    .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 17px; height: 17px; background: linear-gradient(135deg, var(--accent), #2980d9); border-radius: 50%; cursor: pointer; box-shadow: 0 1px 4px rgba(26,107,181,0.4); }
    .control-val { font-size: 11px; color: var(--accent); min-width: 36px; text-align: right; font-weight: 600; }
    .mode-btns { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }
    .mode-btn { padding: 4px 12px; font-size: 11px; background: var(--bg3); border: 1.5px solid var(--border); border-radius: 20px; color: var(--text2); cursor: pointer; transition: all 0.2s; font-weight: 500; }
    .mode-btn:hover, .mode-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .expand-btn { font-size: 11px; color: var(--text2); background: none; border: none; cursor: pointer; padding: 4px 0 0; display: block; width: 100%; text-align: left; transition: color 0.2s; font-weight: 500; }
    .expand-btn:hover { color: var(--accent); }
    .source-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-top: 4px; font-weight: 600; }
    .source-alexa     { background: #e8f0fc; color: var(--accent); }
    .source-dashboard { background: #e8faf0; color: var(--green); }

    .add-card { background: #fff; border: 2px dashed #b8cfe8; border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: all 0.2s; min-height: 120px; color: var(--text2); font-size: 13px; }
    .add-card:hover { border-color: var(--accent); color: var(--accent); background: #f0f7ff; }
    .add-card .add-icon { font-size: 24px; }

    .sidebar { border-left: 1px solid var(--border); display: flex; flex-direction: column; max-height: calc(100vh - 73px); position: sticky; top: 73px; background: #fff; }
    .sidebar-section { padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-section:last-child { border-bottom: none; flex: 1; overflow: hidden; }
    .sidebar h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text2); margin-bottom: 14px; }

    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .quick-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 12px 8px; background: var(--bg3); border: 1.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 11px; font-weight: 600; color: var(--text2); transition: all 0.2s; }
    .quick-btn .qb-icon { font-size: 20px; }
    .quick-btn:hover { background: #f0f7ff; border-color: var(--accent); color: var(--accent); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(26,107,181,0.15); }
    .quick-btn.danger:hover { background: #fff5f5; border-color: var(--red); color: var(--red); box-shadow: 0 2px 8px rgba(220,53,69,0.15); }
    .quick-btn.success:hover { background: #f2fdf5; border-color: var(--green); color: var(--green); box-shadow: 0 2px 8px rgba(39,168,69,0.15); }
    .log-list { display: flex; flex-direction: column; gap: 7px; overflow-y: auto; max-height: 320px; padding-right: 4px; }
    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: #c8d4e0; border-radius: 2px; }
    .log-item { background: var(--bg3); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 12px; border-left: 3px solid var(--border); }
    .log-item.alexa     { border-left-color: var(--accent); }
    .log-item.dashboard { border-left-color: var(--green); }
    .log-cmd  { font-weight: 600; margin-bottom: 2px; color: var(--text); }
    .log-meta { font-size: 10px; color: var(--text2); display: flex; gap: 8px; }

    .reminder-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
    .reminder-input-row input { flex: 1; background: var(--bg3); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 7px 10px; font-size: 13px; outline: none; transition: border-color 0.2s; }
    .reminder-input-row input:focus { border-color: var(--accent); }
    .btn-sm { padding: 7px 14px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: var(--radius-sm); color: #fff; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; white-space: nowrap; box-shadow: 0 2px 6px rgba(26,107,181,0.3); }
    .btn-sm:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,107,181,0.4); }
    .reminder-list { display: flex; flex-direction: column; gap: 6px; }
    .reminder-item { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 7px 10px; background: var(--bg3); border-radius: var(--radius-sm); cursor: pointer; transition: opacity 0.3s; border: 1px solid transparent; }
    .reminder-item:hover { border-color: var(--border); }
    .reminder-item.done { opacity: 0.4; text-decoration: line-through; }
    .reminder-item input[type="checkbox"] { accent-color: var(--green); cursor: pointer; }
    .reminder-src { font-size: 10px; color: var(--text2); margin-left: auto; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,20,40,0.5); backdrop-filter: blur(4px); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 420px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal h2 { font-size: 17px; margin-bottom: 18px; color: var(--text); font-weight: 700; }
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; }
    .form-row input, .form-row select { width: 100%; background: var(--bg3); border: 1.5px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 9px 12px; font-size: 13px; outline: none; transition: border-color 0.2s; }
    .form-row input:focus, .form-row select:focus { border-color: var(--accent); background: #f8fbff; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 22px; }
    .btn { padding: 9px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: #fff; box-shadow: 0 3px 10px rgba(26,107,181,0.35); }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(26,107,181,0.45); }
    .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--text2); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    #toast { position: fixed; bottom: 24px; right: 24px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 18px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.12); transform: translateY(80px); opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 300; max-width: 300px; }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-left: 4px solid var(--green); }
    #toast.info    { border-left: 4px solid var(--accent); }
    #toast.error   { border-left: 4px solid var(--red); }

    .empty-state { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 13px; }
    .empty-state .es-icon { font-size: 40px; margin-bottom: 12px; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 40px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #dde3ea; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg3); }
    ::-webkit-scrollbar-thumb { background: #c8d4e0; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a0b4c8; }
  </style>
</head>
<body>

<!-- ============================================================
     HEADER
============================================================ -->
<header>
  <div class="header-left">
    <img src="logo.png" alt="BEM Participações" class="logo-img" />
    <div class="header-title">
      <h1>Casa Inteligente</h1>
      <p id="headerSub">Carregando...</p>
    </div>
  </div>
  <div class="header-right">
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Conectando...</span>
    </div>
  </div>
</header>

<!-- ============================================================
     STATS BAR
============================================================ -->
<div class="stats-bar">
  <div class="stat-card">
    <div class="val" id="statTotal" style="color:var(--accent)">—</div>
    <div class="lbl">Dispositivos</div>
  </div>
  <div class="stat-card">
    <div class="val" id="statOn" style="color:var(--green)">—</div>
    <div class="lbl">Ligados</div>
  </div>
  <div class="stat-card">
    <div class="val" id="statLights" style="color:var(--yellow)">—</div>
    <div class="lbl">Luzes</div>
  </div>
  <div class="stat-card">
    <div class="val" id="statAC" style="color:var(--purple)">—</div>
    <div class="lbl">Clima</div>
  </div>
  <div class="stat-card">
    <div class="val" id="statCommands" style="color:var(--orange)">—</div>
    <div class="lbl">Comandos Hoje</div>
  </div>
</div>

<!-- ============================================================
     MAIN
============================================================ -->
<div class="main">

  <!-- DEVICES PANEL -->
  <div class="devices-panel">
    <div class="section-header">
      <div class="section-title">Dispositivos</div>
    </div>
    <div id="devicesList">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Quick Actions -->
    <div class="sidebar-section">
      <h3>⚡ Ações Rápidas</h3>
      <div class="quick-actions">
        <button class="quick-btn success" onclick="ligarTudo()">
          <span class="qb-icon">💡</span> Ligar Tudo
        </button>
        <button class="quick-btn danger" onclick="desligarTudo()">
          <span class="qb-icon">🌙</span> Desligar Tudo
        </button>
        <button class="quick-btn" onclick="ligarPorTipo('light')">
          <span class="qb-icon">🔦</span> Só Luzes
        </button>
        <button class="quick-btn" onclick="openModal()">
          <span class="qb-icon">➕</span> Novo Dispositivo
        </button>
      </div>
    </div>

    <!-- Lembretes -->
    <div class="sidebar-section">
      <h3>📝 Lembretes</h3>
      <div class="reminder-input-row">
        <input type="text" id="reminderInput" placeholder="Novo lembrete..." onkeypress="if(event.key==='Enter')addReminder()" />
        <button class="btn-sm" onclick="addReminder()">+ Adicionar</button>
      </div>
      <div class="reminder-list" id="reminderList">
        <div class="empty-state" style="padding:16px">
          <div>📋</div>
          <div>Nenhum lembrete</div>
        </div>
      </div>
    </div>

    <!-- Log de Comandos -->
    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <h3>📊 Últimos Comandos</h3>
      <div class="log-list" id="logList">
        <div class="empty-state" style="padding:16px">
          <div>📭</div>
          <div>Nenhum comando ainda</div>
        </div>
      </div>
    </div>

  </aside>
</div>

<!-- ============================================================
     MODAL - Adicionar Dispositivo
============================================================ -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>➕ Novo Dispositivo</h2>
    <div class="form-row">
      <label>Nome do Dispositivo</label>
      <input type="text" id="newName" placeholder="Ex: Luz da Sala" />
    </div>
    <div class="form-row">
      <label>Tipo</label>
      <select id="newType">
        <option value="light">💡 Luz / Lâmpada</option>
        <option value="ac">❄️ Ar Condicionado</option>
        <option value="tv">📺 TV</option>
        <option value="other">🔌 Outro</option>
      </select>
    </div>
    <div class="form-row">
      <label>Cômodo</label>
      <input type="text" id="newRoom" placeholder="Ex: Sala, Quarto, Cozinha..." list="roomSuggestions" />
      <datalist id="roomSuggestions">
        <option value="Sala"></option>
        <option value="Quarto"></option>
        <option value="Cozinha"></option>
        <option value="Banheiro"></option>
        <option value="Varanda"></option>
        <option value="Escritório"></option>
        <option value="Garagem"></option>
      </datalist>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveDevice()">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- ============================================================
     SCRIPT PRINCIPAL
============================================================ -->
<script>
// ============================================================
// ⚙️  CONFIGURAÇÃO — ALTERE AQUI COM SEUS DADOS DO SUPABASE
// ============================================================
const SUPABASE_URL = 'https://egonicvreizaknzwqvbt.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVnb25pY3ZyZWl6YWtuendxdmJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTQ2ODIsImV4cCI6MjA4OTc3MDY4Mn0.MRNFahn8obGmRHowMliJUIzdcO_CSa-z3IX1RlXdDgw';
// Edge Function para controle físico via Tuya
const TUYA_EDGE_FN = 'https://egonicvreizaknzwqvbt.supabase.co/functions/v1/tuya-control';
// ============================================================

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

// Estado local
let allDevices  = [];
let allReminders = [];

// ============================================================
// INICIALIZAÇÃO
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  await loadAll();
  subscribeRealtime();
});

async function loadAll() {
  await Promise.all([loadDevices(), loadReminders(), loadLog()]);
  updateStats();
  renderDevices();
}

// ============================================================
// DISPOSITIVOS
// ============================================================
async function loadDevices() {
  const { data, error } = await db.from('devices').select('*').order('room').order('name');
  if (error) { showStatus(false); return; }
  allDevices = data || [];
  showStatus(true);
}

function renderDevices() {
  const container = document.getElementById('devicesList');

  if (allDevices.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="es-icon">📦</div>
        <p>Nenhum dispositivo cadastrado.</p>
        <p style="margin-top:8px">Clique em <strong>+ Novo Dispositivo</strong> para começar.</p>
      </div>`;
    return;
  }

  // Agrupa por cômodo
  const rooms = {};
  for (const d of allDevices) {
    if (!rooms[d.room]) rooms[d.room] = [];
    rooms[d.room].push(d);
  }

  const roomIcons = {
    'Sala':'🛋️', 'Quarto':'🛏️', 'Quarto Casal':'🛏️', 'Quarto Clarinha':'🛏️',
    'Cozinha':'🍳', 'Banheiro':'🚿', 'Lavabo':'🪥', 'Hall':'🚪',
    'Varanda':'🌿', 'Escritório':'💼', 'Garagem':'🚗',
    'Área Externa':'🏊', 'Geral':'🔌'
  };

  container.innerHTML = Object.entries(rooms).map(([room, devices]) => `
    <div class="room-group">
      <div class="room-title">
        ${roomIcons[room] || '🏠'} ${room}
        <span class="room-count">${devices.length}</span>
      </div>
      <div class="devices-grid">
        ${devices.map(d => deviceCardHTML(d)).join('')}
        <div class="add-card" onclick="openModal('${room}')">
          <span class="add-icon">➕</span>
          <span>Adicionar</span>
        </div>
      </div>
    </div>
  `).join('');
}

function deviceCardHTML(d) {
  const icons = { light:'💡', ac:'❄️', tv:'📺', other:'🔌' };
  const icon  = icons[d.type] || '🔌';

  let extraControls = '';

  if (d.type === 'light') {
    extraControls = `
      <div class="control-row">
        <span class="control-label">Brilho</span>
        <input type="range" class="slider" min="0" max="100" value="${d.brightness || 100}"
          oninput="this.nextElementSibling.textContent=this.value+'%'"
          onchange="updateDevice('${d.id}', {brightness:parseInt(this.value), status:parseInt(this.value)>0})" />
        <span class="control-val">${d.brightness || 100}%</span>
      </div>`;
  }

  if (d.type === 'ac') {
    const modes = [['cool','❄️ Frio'], ['heat','🔥 Quente'], ['fan','💨 Ventilador'], ['auto','🔄 Auto']];
    extraControls = `
      <div class="control-row">
        <span class="control-label">Temp</span>
        <input type="range" class="slider" min="16" max="30" value="${d.temperature || 22}"
          oninput="this.nextElementSibling.textContent=this.value+'°C'"
          onchange="updateDevice('${d.id}', {temperature:parseInt(this.value)})" />
        <span class="control-val">${d.temperature || 22}°C</span>
      </div>
      <div class="mode-btns">
        ${modes.map(([k,v]) => `<button class="mode-btn ${d.ac_mode===k?'active':''}"
          onclick="updateDevice('${d.id}',{ac_mode:'${k}'})">${v}</button>`).join('')}
      </div>`;
  }

  if (d.type === 'tv') {
    extraControls = `
      <div class="control-row">
        <span class="control-label">Volume</span>
        <input type="range" class="slider" min="0" max="100" value="${d.volume || 30}"
          oninput="this.nextElementSibling.textContent=this.value"
          onchange="updateDevice('${d.id}', {volume:parseInt(this.value)})" />
        <span class="control-val">${d.volume || 30}</span>
      </div>`;
  }

  const sourceClass = d.last_changed === 'alexa' ? 'source-alexa' : 'source-dashboard';
  const sourceLabel = d.last_changed === 'alexa' ? '🎙️ Alexa' : '🖥️ Painel';

  return `
    <div class="device-card ${d.status ? 'on' : ''}" id="card-${d.id}">
      <div class="card-header">
        <span class="device-icon">${icon}</span>
        <label class="toggle" onclick="event.stopPropagation()">
          <input type="checkbox" ${d.status ? 'checked' : ''}
            onchange="updateDevice('${d.id}', {status:this.checked})" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="device-name">${d.name}</div>
      <div class="device-info">
        ${d.type === 'ac' && d.status ? `${d.temperature || 22}°C · ${d.ac_mode || 'cool'}` : ''}
        ${d.type === 'tv' && d.status ? `Vol: ${d.volume || 30}` : ''}
        ${d.type === 'light' && d.status ? `${d.brightness || 100}%` : d.status ? 'Ligado' : 'Desligado'}
        ${!d.status && d.type !== 'light' ? 'Desligado' : ''}
      </div>
      <span class="source-badge ${sourceClass}">${sourceLabel}</span>
      ${extraControls ? `
        <div class="card-controls">${extraControls}</div>
        <button class="expand-btn" onclick="toggleExpand('${d.id}', this)">⚙️ Configurar ▾</button>
      ` : ''}
    </div>`;
}

function toggleExpand(id, btn) {
  const card = document.getElementById('card-' + id);
  const open = card.classList.toggle('expanded');
  btn.textContent = open ? '⚙️ Fechar ▴' : '⚙️ Configurar ▾';
}

async function updateDevice(id, fields) {
  const device = allDevices.find(d => d.id === id);
  if (!device) return;

  fields.last_changed = 'dashboard';

  const { error } = await db.from('devices').update(fields).eq('id', id);
  if (error) { showToast('Erro ao atualizar dispositivo', 'error'); return; }

  // Log
  const changedKeys = Object.keys(fields).filter(k => k !== 'last_changed');
  const cmdStr = changedKeys.map(k => `${k}=${fields[k]}`).join(', ');
  await db.from('commands_log').insert({
    device_id:   id,
    device_name: device.name,
    command:     `Dashboard: ${cmdStr}`,
    source:      'dashboard',
    success:     true,
  });

  // ── Controle físico via Tuya (se dispositivo tiver tuya_device_id) ──
  if ('status' in fields && device.tuya_device_id) {
    try {
      const resp = await fetch(TUYA_EDGE_FN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
        body: JSON.stringify({ action: 'control', device_id: device.tuya_device_id, value: fields.status }),
      });
      const result = await resp.json();
      if (!result.success) {
        console.warn('Tuya control failed:', result);
        showToast(`${device.name}: erro Tuya ⚠️`, 'error');
      }
    } catch (e) {
      console.warn('Tuya fetch error:', e);
    }
  }

  // Controle fisico via Tuya
  if ('status' in fields && device.tuya_device_id) {
    try {
      const resp = await fetch(TUYA_EDGE_FN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ action: 'control', device_id: device.tuya_device_id, value: fields.status }),
      });
      const result = await resp.json();
      if (!result.success) showToast(device.name + ': erro Tuya', 'error');
    } catch (e) { console.warn('Tuya error:', e); }
  }

  // Atualiza localmente
  Object.assign(device, fields);
  updateStats();
  renderDevices();

  const isToggle = 'status' in fields && Object.keys(fields).length <= 2;
  if (isToggle) {
    showToast(`${device.name} ${fields.status ? 'ligado ✅' : 'desligado 🔴'}`, fields.status ? 'success' : 'info');
  }
}

// ============================================================
// AÇÕES RÁPIDAS
// ============================================================
async function ligarTudo() {
  if (allDevices.length === 0) return;
  for (const d of allDevices) {
    if (!d.status) await updateDevice(d.id, { status: true });
  }
  showToast('Tudo ligado! 💡', 'success');
}

async function desligarTudo() {
  for (const d of allDevices) {
    if (d.status) await updateDevice(d.id, { status: false });
  }
  showToast('Casa no modo economia 🌙', 'info');
}

async function ligarPorTipo(tipo) {
  for (const d of allDevices.filter(d => d.type === tipo)) {
    if (!d.status) await updateDevice(d.id, { status: true });
  }
  showToast(`Todas as luzes ligadas! 💡`, 'success');
}

// ============================================================
// ESTATÍSTICAS
// ============================================================
function updateStats() {
  const ligados = allDevices.filter(d => d.status);
  document.getElementById('statTotal').textContent  = allDevices.length;
  document.getElementById('statOn').textContent     = ligados.length;
  document.getElementById('statLights').textContent = allDevices.filter(d => d.type === 'light' && d.status).length;
  document.getElementById('statAC').textContent     = allDevices.filter(d => d.type === 'ac' && d.status).length;

  const now = new Date(); now.setHours(0,0,0,0);
  document.getElementById('headerSub').textContent =
    `${ligados.length}/${allDevices.length} ativos · ${new Date().toLocaleString('pt-BR',{weekday:'long'})}`;
}

// ============================================================
// LOG DE COMANDOS
// ============================================================
async function loadLog() {
  const today = new Date().toISOString().split('T')[0];
  const { data } = await db.from('commands_log')
    .select('*')
    .gte('created_at', today + 'T00:00:00')
    .order('created_at', { ascending: false })
    .limit(30);

  document.getElementById('statCommands').textContent = (data || []).length;
  renderLog(data || []);
}

function renderLog(logs) {
  const el = document.getElementById('logList');
  if (logs.length === 0) {
    el.innerHTML = `<div class="empty-state" style="padding:16px"><div>📭</div><div>Nenhum comando hoje</div></div>`;
    return;
  }
  el.innerHTML = logs.map(l => `
    <div class="log-item ${l.source}">
      <div class="log-cmd">${l.command}</div>
      <div class="log-meta">
        <span>${l.source === 'alexa' ? '🎙️ Alexa' : '🖥️ Painel'}</span>
        <span>${l.device_name}</span>
        <span>${new Date(l.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</span>
      </div>
    </div>`).join('');
}

// ============================================================
// LEMBRETES
// ============================================================
async function loadReminders() {
  const { data } = await db.from('reminders').select('*').order('created_at', { ascending: false }).limit(20);
  allReminders = data || [];
  renderReminders();
}

function renderReminders() {
  const el = document.getElementById('reminderList');
  if (allReminders.length === 0) {
    el.innerHTML = `<div class="empty-state" style="padding:16px"><div>📋</div><div>Nenhum lembrete</div></div>`;
    return;
  }
  el.innerHTML = allReminders.map(r => `
    <div class="reminder-item ${r.done ? 'done' : ''}" id="rem-${r.id}">
      <input type="checkbox" ${r.done ? 'checked' : ''} onchange="toggleReminder('${r.id}', this.checked)" />
      <span>${r.title}</span>
      <span class="reminder-src">${r.source === 'alexa' ? '🎙️' : '🖥️'}</span>
    </div>`).join('');
}

async function addReminder() {
  const input = document.getElementById('reminderInput');
  const title = input.value.trim();
  if (!title) return;

  const { data, error } = await db.from('reminders').insert({ title, source: 'dashboard' }).select().single();
  if (error) { showToast('Erro ao criar lembrete', 'error'); return; }

  allReminders.unshift(data);
  renderReminders();
  input.value = '';
  showToast('Lembrete adicionado! 📝', 'success');
}

async function toggleReminder(id, done) {
  await db.from('reminders').update({ done }).eq('id', id);
  const r = allReminders.find(r => r.id === id);
  if (r) r.done = done;
  renderReminders();
}

// ============================================================
// MODAL - NOVO DISPOSITIVO
// ============================================================
function openModal(room = '') {
  document.getElementById('newRoom').value = room;
  document.getElementById('newName').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('newName').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function saveDevice() {
  const name = document.getElementById('newName').value.trim();
  const type = document.getElementById('newType').value;
  const room = document.getElementById('newRoom').value.trim();

  if (!name || !room) { showToast('Preencha nome e cômodo', 'error'); return; }

  const { data, error } = await db.from('devices').insert({ name, type, room }).select().single();
  if (error) { showToast('Erro ao salvar dispositivo', 'error'); return; }

  allDevices.push(data);
  updateStats();
  renderDevices();
  closeModal();
  showToast(`${name} adicionado! ✅`, 'success');
}

// ============================================================
// REALTIME - ATUALIZAÇÕES AO VIVO
// ============================================================
function subscribeRealtime() {
  db.channel('casa-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'devices' }, (payload) => {
      if (payload.eventType === 'UPDATE') {
        const idx = allDevices.findIndex(d => d.id === payload.new.id);
        if (idx !== -1) allDevices[idx] = { ...allDevices[idx], ...payload.new };
      } else if (payload.eventType === 'INSERT') {
        if (!allDevices.find(d => d.id === payload.new.id)) allDevices.push(payload.new);
      } else if (payload.eventType === 'DELETE') {
        allDevices = allDevices.filter(d => d.id !== payload.old.id);
      }
      updateStats();
      renderDevices();
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'commands_log' }, (payload) => {
      const el = document.getElementById('logList');
      const newLog = payload.new;
      const item = document.createElement('div');
      item.className = `log-item ${newLog.source}`;
      item.innerHTML = `
        <div class="log-cmd">${newLog.command}</div>
        <div class="log-meta">
          <span>${newLog.source === 'alexa' ? '🎙️ Alexa' : '🖥️ Painel'}</span>
          <span>${newLog.device_name}</span>
          <span>${new Date(newLog.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</span>
        </div>`;
      if (el.querySelector('.empty-state')) el.innerHTML = '';
      el.prepend(item);

      // Atualiza contador
      const stat = document.getElementById('statCommands');
      stat.textContent = parseInt(stat.textContent || '0') + 1;
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reminders' }, (payload) => {
      if (!allReminders.find(r => r.id === payload.new.id)) {
        allReminders.unshift(payload.new);
        renderReminders();
        if (payload.new.source === 'alexa') {
          showToast(`🎙️ Lembrete via Alexa: ${payload.new.title}`, 'info');
        }
      }
    })
    .subscribe((status) => {
      showStatus(status === 'SUBSCRIBED');
    });
}

// ============================================================
// UTILITÁRIOS
// ============================================================
function showStatus(online) {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className  = `status-dot ${online ? 'online' : 'offline'}`;
  text.textContent = online ? 'Conectado' : 'Sem conexão';
}

let toastTimer;
function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = type; }, 3000);
}
</script>
