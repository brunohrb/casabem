<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casa Inteligente 🏠 — Bruno</title>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ============================================================
       VARIÁVEIS E RESET
    ============================================================ */
    :root {
      --bg:          #0d1117;
      --bg2:         #161b22;
      --bg3:         #21262d;
      --border:      #30363d;
      --text:        #e6edf3;
      --text2:       #8b949e;
      --accent:      #58a6ff;
      --accent2:     #1f6feb;
      --green:       #3fb950;
      --red:         #f85149;
      --yellow:      #d29922;
      --purple:      #bc8cff;
      --orange:      #f0883e;
      --radius:      12px;
      --radius-sm:   8px;
      --shadow:      0 4px 24px rgba(0,0,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ============================================================
       HEADER
    ============================================================ */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .logo { font-size: 28px; }

    .header-title h1 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }

    .header-title p {
      font-size: 12px;
      color: var(--text2);
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text2);
      background: var(--bg3);
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text2);
      transition: background 0.3s;
    }

    .status-dot.online  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.offline { background: var(--red); }

    /* ============================================================
       STATS BAR
    ============================================================ */
    .stats-bar {
      display: flex;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      min-width: 140px;
      text-align: center;
      flex-shrink: 0;
    }

    .stat-card .val {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-card .lbl {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ============================================================
       MAIN LAYOUT
    ============================================================ */
    .main {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .sidebar { border-left: none; border-top: 1px solid var(--border); }
    }

    /* ============================================================
       DEVICES PANEL
    ============================================================ */
    .devices-panel { padding: 24px; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .room-group { margin-bottom: 32px; }

    .room-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .room-count {
      font-size: 11px;
      background: var(--bg3);
      color: var(--text2);
      padding: 2px 8px;
      border-radius: 10px;
    }

    .devices-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
    }

    /* ============================================================
       DEVICE CARD
    ============================================================ */
    .device-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .device-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--border);
      transition: background 0.3s;
    }

    .device-card.on::before { background: var(--green); }
    .device-card.on { border-color: rgba(63,185,80,0.3); }

    .device-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .device-icon {
      font-size: 28px;
      line-height: 1;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--bg3);
      border-radius: 24px;
      transition: .3s;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      left: 3px; top: 3px;
      width: 16px; height: 16px;
      background: var(--text2);
      border-radius: 50%;
      transition: .3s;
    }

    .toggle input:checked + .toggle-slider { background: var(--green); border-color: var(--green); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(20px); background: #fff; }

    .device-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .device-info {
      font-size: 12px;
      color: var(--text2);
    }

    /* Sliders dentro dos cards */
    .card-controls { margin-top: 12px; display: none; }
    .device-card.expanded .card-controls { display: block; }

    .control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .control-label { font-size: 11px; color: var(--text2); min-width: 50px; }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      background: var(--bg3);
      border-radius: 4px;
      outline: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    .control-val { font-size: 11px; color: var(--accent); min-width: 36px; text-align: right; }

    /* Botões de modo AC */
    .mode-btns { display: flex; gap: 4px; margin-top: 8px; flex-wrap: wrap; }

    .mode-btn {
      padding: 3px 10px;
      font-size: 11px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn:hover, .mode-btn.active { background: var(--accent2); border-color: var(--accent); color: var(--text); }

    .expand-btn {
      font-size: 11px;
      color: var(--text2);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0 0;
      display: block;
      width: 100%;
      text-align: left;
      transition: color 0.2s;
    }

    .expand-btn:hover { color: var(--accent); }

    /* Source badge */
    .source-badge {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      margin-top: 4px;
    }

    .source-alexa    { background: #1a3a5c; color: var(--accent); }
    .source-dashboard{ background: #1a3a1a; color: var(--green); }

    /* ============================================================
       ADD DEVICE CARD
    ============================================================ */
    .add-card {
      background: var(--bg2);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 120px;
      color: var(--text2);
      font-size: 13px;
    }

    .add-card:hover { border-color: var(--accent); color: var(--accent); }
    .add-card .add-icon { font-size: 24px; }

    /* ============================================================
       SIDEBAR
    ============================================================ */
    .sidebar {
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 57px);
      position: sticky;
      top: 57px;
    }

    .sidebar-section {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section:last-child { border-bottom: none; flex: 1; overflow: hidden; }

    .sidebar h3 {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text2);
      margin-bottom: 14px;
    }

    /* Quick actions */
    .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .quick-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 11px;
      color: var(--text2);
      transition: all 0.2s;
    }

    .quick-btn .qb-icon { font-size: 20px; }
    .quick-btn:hover { background: var(--bg); border-color: var(--accent); color: var(--text); }

    .quick-btn.danger:hover { border-color: var(--red); color: var(--red); }
    .quick-btn.success:hover { border-color: var(--green); color: var(--green); }

    /* Log */
    .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow-y: auto;
      max-height: 320px;
      padding-right: 4px;
    }

    .log-list::-webkit-scrollbar { width: 4px; }
    .log-list::-webkit-scrollbar-track { background: transparent; }
    .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .log-item {
      background: var(--bg3);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      font-size: 12px;
      border-left: 3px solid var(--border);
    }

    .log-item.alexa    { border-left-color: var(--accent); }
    .log-item.dashboard{ border-left-color: var(--green); }

    .log-cmd  { font-weight: 600; margin-bottom: 2px; }
    .log-meta { font-size: 10px; color: var(--text2); display: flex; gap: 8px; }

    /* Reminders */
    .reminder-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .reminder-input-row input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 7px 10px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .reminder-input-row input:focus { border-color: var(--accent); }

    .btn-sm {
      padding: 7px 14px;
      background: var(--accent2);
      border: 1px solid var(--accent);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-sm:hover { background: var(--accent); }

    .reminder-list { display: flex; flex-direction: column; gap: 6px; }

    .reminder-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      padding: 6px 8px;
      background: var(--bg3);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .reminder-item.done { opacity: 0.4; text-decoration: line-through; }
    .reminder-item input[type="checkbox"] { accent-color: var(--green); cursor: pointer; }
    .reminder-src { font-size: 10px; color: var(--text2); margin-left: auto; }

    /* ============================================================
       MODAL - Adicionar Dispositivo
    ============================================================ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 400px;
      max-width: 95vw;
      box-shadow: var(--shadow);
    }

    .modal h2 { font-size: 16px; margin-bottom: 16px; }

    .form-row { margin-bottom: 14px; }

    .form-row label {
      display: block;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 5px;
    }

    .form-row input,
    .form-row select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-row input:focus,
    .form-row select:focus { border-color: var(--accent); }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    .btn {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary { background: var(--accent2); border: 1px solid var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent); }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
    .btn-ghost:hover { border-color: var(--text2); color: var(--text); }

    /* ============================================================
       TOAST
    ============================================================ */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 13px;
      box-shadow: var(--shadow);
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
      z-index: 300;
      max-width: 300px;
    }

    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-left: 3px solid var(--green); }
    #toast.info    { border-left: 3px solid var(--accent); }
    #toast.error   { border-left: 3px solid var(--red); }

    /* ============================================================
       EMPTY STATE
    ============================================================ */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
      font-size: 13px;
    }

    .empty-state .es-icon { font-size: 40px; margin-bottom: 12px; }

    /* ============================================================
       LOADING
    ============================================================ */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<!-- ============================================================
     HEADER
============================================================ -->

  <div class="header-left">
    <div class="logo">🏠</div>
    <div class="header-title">
      <h1>Casa Inteligente</h1>
      <p id="headerSub">Carregando...</p>

  </div>
  <div class="header-right">
    <div class="status-badge">

<!-- ============================================================

============================================================ -->
<div class="stats-bar">

  <div class="stat-card">
    <div class="val" id="statOn" style="color:var(--green)">—</div>

  </div>
  <div class="stat-card">
    <div class="val" id="statLights" style="color:var(--yellow)">—</div>
    <div class="lbl">Luzes</div>
  </div>
  <div class="stat-card">
    <div class="val" id="statAC" style="color:var(--purple)">—</div>
    <div class="lbl">Clima</div>

    <div class="val" id="statCommands" style="color:var(--orange)">—</div>

</div>

<!-- ============================================================
     MAIN
============================================================ -->
<div class="main">

  <!-- DEVICES PANEL -->
  <div class="devices-panel">
    <div class="section-header">
      <div class="section-title">Dispositivos</div>
    </div>
    <div id="devicesList">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <!-- Quick Actions -->
    <div class="sidebar-section">
      <h3>⚡ Ações Rápidas</h3>
      <div class="quick-actions">

          <span class="qb-icon">💡</span> Ligar Tudo
        </button>
        <button class="quick-btn danger" onclick="desligarTudo()">
          <span class="qb-icon">🌙</span> Desligar Tudo
        </button>
        <button class="quick-btn" onclick="ligarPorTipo('light')">
          <span class="qb-icon">🔦</span> Só Luzes
        </button>
        <button class="quick-btn" onclick="openModal()">
          <span class="qb-icon">➕</span> Novo Dispositivo
        </button>
      </div>
    </div>

    <!-- Lembretes -->
    <div class="sidebar-section">
      <h3>📝 Lembretes</h3>
      <div class="reminder-input-row">
        <input type="text" id="reminderInput" placeholder="Novo lembrete..." onkeypress="if(event.key==='Enter')addReminder()" />
        <button class="btn-sm" onclick="addReminder()">+ Adicionar</button>
      </div>
      <div class="reminder-list" id="reminderList">
        <div class="empty-state" style="padding:16px">
          <div>📋</div>
          <div>Nenhum lembrete</div>
        </div>
      </div>
    </div>

    <!-- Log de Comandos -->
    <div class="sidebar-section" style="flex:1;overflow:hidden;display:flex;flex-direction:column">
      <h3>📊 Últimos Comandos</h3>
      <div class="log-list" id="logList">
        <div class="empty-state" style="padding:16px">
          <div>📭</div>
          <div>Nenhum comando ainda</div>
        </div>
      </div>
    </div>

  </aside>
</div>

<!-- ============================================================
     MODAL - Adicionar Dispositivo
============================================================ -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>➕ Novo Dispositivo</h2>
    <div class="form-row">
      <label>Nome do Dispositivo</label>
      <input type="text" id="newName" placeholder="Ex: Luz da Sala" />
    </div>
    <div class="form-row">
      <label>Tipo</label>
      <select id="newType">
        <option value="light">💡 Luz / Lâmpada</option>
        <option value="ac">❄️ Ar Condicionado</option>
        <option value="tv">📺 TV</option>
        <option value="other">🔌 Outro</option>
      </select>
    </div>
    <div class="form-row">
      <label>Cômodo</label>
      <input type="text" id="newRoom" placeholder="Ex: Sala, Quarto, Cozinha..." list="roomSuggestions" />
      <datalist id="roomSuggestions">
        <option value="Sala"></option>
        <option value="Quarto"></option>
        <option value="Cozinha"></option>
        <option value="Banheiro"></option>
        <option value="Varanda"></option>
        <option value="Escritório"></option>
        <option value="Garagem"></option>
      </datalist>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveDevice()">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

// ============================================================
// INICIALIZAÇÃO
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  await loadAll();
  subscribeRealtime();
});

async function loadAll() {
  await Promise.all([loadDevices(), loadReminders(), loadLog()]);
  updateStats();
  renderDevices();
}

// ============================================================
// DISPOSITIVOS
// ============================================================
async function loadDevices() {
  const { data, error } = await db.from('devices').select('*').order('room').order('name');
  if (error) { showStatus(false); return; }
  allDevices = data || [];
  showStatus(true);
}

function renderDevices() {
  const container = document.getElementById('devicesList');

  if (allDevices.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="es-icon">📦</div>
        <p>Nenhum dispositivo cadastrado.</p>
        <p style="margin-top:8px">Clique em <strong>+ Novo Dispositivo</strong> para começar.</p>
      </div>`;
    return;
  }

  // Agrupa por cômodo
  const rooms = {};
  for (const d of allDevices) {
    if (!rooms[d.room]) rooms[d.room] = [];
    rooms[d.room].push(d);
  }

  const roomIcons = { Sala:'🛋️', Quarto:'🛏️', Cozinha:'🍳', Banheiro:'🚿',
                      Varanda:'🌿', Escritório:'💼', Garagem:'🚗' };

  container.innerHTML = Object.entries(rooms).map(([room, devices]) => `
    <div class="room-group">
      <div class="room-title">
        ${roomIcons[room] || '🏠'} ${room}
        <span class="room-count">${devices.length}</span>
      </div>
      <div class="devices-grid">
        ${devices.map(d => deviceCardHTML(d)).join('')}
        <div class="add-card" onclick="openModal('${room}')">
          <span class="add-icon">➕</span>
          <span>Adicionar</span>
        </div>
      </div>
    </div>
  `).join('');
}

function deviceCardHTML(d) {
  const icons = { light:'💡', ac:'❄️', tv:'📺', other:'🔌' };
  const icon  = icons[d.type] || '🔌';

  let extraControls = '';

  if (d.type === 'light') {
    extraControls = `
      <div class="control-row">
        <span class="control-label">Brilho</span>
        <input type="range" class="slider" min="0" max="100" value="${d.brightness || 100}"
          oninput="this.nextElementSibling.textContent=this.value+'%'"
          onchange="updateDevice('${d.id}', {brightness:parseInt(this.value), status:parseInt(this.value)>0})" />
        <span class="control-val">${d.brightness || 100}%</span>
      </div>`;
  }

  if (d.type === 'ac') {
    const modes = [['cool','❄️ Frio'], ['heat','🔥 Quente'], ['fan','💨 Ventilador'], ['auto','🔄 Auto']];
    extraControls = `
      <div class="control-row">
        <span class="control-label">Temp</span>
        <input type="range" class="slider" min="16" max="30" value="${d.temperature || 22}"
          oninput="this.nextElementSibling.textContent=this.value+'°C'"
          onchange="updateDevice('${d.id}', {temperature:parseInt(this.value)})" />
        <span class="control-val">${d.temperature || 22}°C</span>
      </div>
      <div class="mode-btns">
        ${modes.map(([k,v]) => `<button class="mode-btn ${d.ac_mode===k?'active':''}"
          onclick="updateDevice('${d.id}',{ac_mode:'${k}'})">${v}</button>`).join('')}
      </div>`;
  }

  if (d.type === 'tv') {
    extraControls = `
      <div class="control-row">
        <span class="control-label">Volume</span>
        <input type="range" class="slider" min="0" max="100" value="${d.volume || 30}"
          oninput="this.nextElementSibling.textContent=this.value"
          onchange="updateDevice('${d.id}', {volume:parseInt(this.value)})" />
        <span class="control-val">${d.volume || 30}</span>
      </div>`;
  }

  const sourceClass = d.last_changed === 'alexa' ? 'source-alexa' : 'source-dashboard';
  const sourceLabel = d.last_changed === 'alexa' ? '🎙️ Alexa' : '🖥️ Painel';

  return `
    <div class="device-card ${d.status ? 'on' : ''}" id="card-${d.id}">
      <div class="card-header">
        <span class="device-icon">${icon}</span>
        <label class="toggle" onclick="event.stopPropagation()">
          <input type="checkbox" ${d.status ? 'checked' : ''}
            onchange="updateDevice('${d.id}', {status:this.checked})" />
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="device-name">${d.name}</div>
      <div class="device-info">
        ${d.type === 'ac' && d.status ? `${d.temperature || 22}°C · ${d.ac_mode || 'cool'}` : ''}
        ${d.type === 'tv' && d.status ? `Vol: ${d.volume || 30}` : ''}
        ${d.type === 'light' && d.status ? `${d.brightness || 100}%` : d.status ? 'Ligado' : 'Desligado'}
        ${!d.status && d.type !== 'light' ? 'Desligado' : ''}
      </div>
      <span class="source-badge ${sourceClass}">${sourceLabel}</span>
      ${extraControls ? `
        <div class="card-controls">${extraControls}</div>
        <button class="expand-btn" onclick="toggleExpand('${d.id}', this)">⚙️ Configurar ▾</button>
      ` : ''}
    </div>`;
}

function toggleExpand(id, btn) {
  const card = document.getElementById('card-' + id);
  const open = card.classList.toggle('expanded');
  btn.textContent = open ? '⚙️ Fechar ▴' : '⚙️ Configurar ▾';
}

async function updateDevice(id, fields) {
  const device = allDevices.find(d => d.id === id);
  if (!device) return;

  fields.last_changed = 'dashboard';

  const { error } = await db.from('devices').update(fields).eq('id', id);
  if (error) { showToast('Erro ao atualizar dispositivo', 'error'); return; }

  // Log
  const changedKeys = Object.keys(fields).filter(k => k !== 'last_changed');
  const cmdStr = changedKeys.map(k => `${k}=${fields[k]}`).join(', ');
  await db.from('commands_log').insert({
    device_id:   id,
    device_name: device.name,
    command:     `Dashboard: ${cmdStr}`,
    source:      'dashboard',
    success:     true,
  });

  // ── Controle físico via Tuya (se dispositivo tiver tuya_device_id) ──
  if ('status' in fields && device.tuya_device_id) {
    try {
      const resp = await fetch(TUYA_EDGE_FN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ action: 'control', device_id: device.tuya_device_id, value: fields.status }),
      });
      const result = await resp.json();
      if (!result.success) {
        console.warn('Tuya control failed:', result);
        showToast(`${device.name}: erro Tuya ⚠️`, 'error');
      }
    } catch (e) {
      console.warn('Tuya fetch error:', e);
    }
  }

  // Controle fisico via Tuya
  if ('status' in fields && device.tuya_device_id) {
    try {
      const resp = await fetch(TUYA_EDGE_FN, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ action: 'control', device_id: device.tuya_device_id, value: fields.status }),
      });
      const result = await resp.json();
      if (!result.success) showToast(device.name + ': erro Tuya', 'error');
    } catch (e) { console.warn('Tuya error:', e); }
  }

  // Atualiza localmente
  Object.assign(device, fields);
  updateStats();
  renderDevices();

  const isToggle = 'status' in fields && Object.keys(fields).length <= 2;
  if (isToggle) {
    showToast(`${device.name} ${fields.status ? 'ligado ✅' : 'desligado 🔴'}`, fields.status ? 'success' : 'info');
  }
}

// ============================================================
// AÇÕES RÁPIDAS
// ============================================================
async function ligarTudo() {
  if (allDevices.length === 0) return;
  for (const d of allDevices) {
    if (!d.status) await updateDevice(d.id, { status: true });
  }
  showToast('Tudo ligado! 💡', 'success');
}

async function desligarTudo() {
  for (const d of allDevices) {
    if (d.status) await updateDevice(d.id, { status: false });
  }
  showToast('Casa no modo economia 🌙', 'info');
}

async function ligarPorTipo(tipo) {
  for (const d of allDevices.filter(d => d.type === tipo)) {
    if (!d.status) await updateDevice(d.id, { status: true });
  }
  showToast(`Todas as luzes ligadas! 💡`, 'success');
}

// ============================================================
// ESTATÍSTICAS
// ============================================================
function updateStats() {
  const ligados = allDevices.filter(d => d.status);
  document.getElementById('statTotal').textContent  = allDevices.length;
  document.getElementById('statOn').textContent     = ligados.length;
  document.getElementById('statLights').textContent = allDevices.filter(d => d.type === 'light' && d.status).length;
  document.getElementById('statAC').textContent     = allDevices.filter(d => d.type === 'ac' && d.status).length;

  const now = new Date(); now.setHours(0,0,0,0);
  document.getElementById('headerSub').textContent =
    `${ligados.length}/${allDevices.length} ativos · ${new Date().toLocaleString('pt-BR',{weekday:'long'})}`;
}

// ============================================================
// LOG DE COMANDOS
// ============================================================
async function loadLog() {
  const today = new Date().toISOString().split('T')[0];
  const { data } = await db.from('commands_log')
    .select('*')
    .gte('created_at', today + 'T00:00:00')
    .order('created_at', { ascending: false })
    .limit(30);

  document.getElementById('statCommands').textContent = (data || []).length;
  renderLog(data || []);
}

function renderLog(logs) {
  const el = document.getElementById('logList');
  if (logs.length === 0) {
    el.innerHTML = `<div class="empty-state" style="padding:16px"><div>📭</div><div>Nenhum comando hoje</div></div>`;
    return;
  }
  el.innerHTML = logs.map(l => `
    <div class="log-item ${l.source}">
      <div class="log-cmd">${l.command}</div>
      <div class="log-meta">
        <span>${l.source === 'alexa' ? '🎙️ Alexa' : '🖥️ Painel'}</span>
        <span>${l.device_name}</span>
        <span>${new Date(l.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</span>
      </div>
    </div>`).join('');
}

// ============================================================
// LEMBRETES
// ============================================================
async function loadReminders() {
  const { data } = await db.from('reminders').select('*').order('created_at', { ascending: false }).limit(20);
  allReminders = data || [];
  renderReminders();
}

function renderReminders() {
  const el = document.getElementById('reminderList');
  if (allReminders.length === 0) {
    el.innerHTML = `<div class="empty-state" style="padding:16px"><div>📋</div><div>Nenhum lembrete</div></div>`;
    return;
  }
  el.innerHTML = allReminders.map(r => `
    <div class="reminder-item ${r.done ? 'done' : ''}" id="rem-${r.id}">
      <input type="checkbox" ${r.done ? 'checked' : ''} onchange="toggleReminder('${r.id}', this.checked)" />
      <span>${r.title}</span>
      <span class="reminder-src">${r.source === 'alexa' ? '🎙️' : '🖥️'}</span>
    </div>`).join('');
}

async function addReminder() {
  const input = document.getElementById('reminderInput');
  const title = input.value.trim();
  if (!title) return;

  const { data, error } = await db.from('reminders').insert({ title, source: 'dashboard' }).select().single();
  if (error) { showToast('Erro ao criar lembrete', 'error'); return; }

  allReminders.unshift(data);
  renderReminders();
  input.value = '';
  showToast('Lembrete adicionado! 📝', 'success');
}

async function toggleReminder(id, done) {
  await db.from('reminders').update({ done }).eq('id', id);
  const r = allReminders.find(r => r.id === id);
  if (r) r.done = done;
  renderReminders();
}

// ============================================================
// MODAL - NOVO DISPOSITIVO
// ============================================================
function openModal(room = '') {
  document.getElementById('newRoom').value = room;
  document.getElementById('newName').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('newName').focus(), 100);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function saveDevice() {
  const name = document.getElementById('newName').value.trim();
  const type = document.getElementById('newType').value;
  const room = document.getElementById('newRoom').value.trim();

  if (!name || !room) { showToast('Preencha nome e cômodo', 'error'); return; }

  const { data, error } = await db.from('devices').insert({ name, type, room }).select().single();
  if (error) { showToast('Erro ao salvar dispositivo', 'error'); return; }

  allDevices.push(data);
  updateStats();
  renderDevices();
  closeModal();
  showToast(`${name} adicionado! ✅`, 'success');
}

// ============================================================
// REALTIME - ATUALIZAÇÕES AO VIVO
// ============================================================
function subscribeRealtime() {
  db.channel('casa-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'devices' }, (payload) => {
      if (payload.eventType === 'UPDATE') {
        const idx = allDevices.findIndex(d => d.id === payload.new.id);
        if (idx !== -1) allDevices[idx] = { ...allDevices[idx], ...payload.new };
      } else if (payload.eventType === 'INSERT') {
        if (!allDevices.find(d => d.id === payload.new.id)) allDevices.push(payload.new);
      } else if (payload.eventType === 'DELETE') {
        allDevices = allDevices.filter(d => d.id !== payload.old.id);
      }
      updateStats();
      renderDevices();
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'commands_log' }, (payload) => {
      const el = document.getElementById('logList');
      const newLog = payload.new;
      const item = document.createElement('div');
      item.className = `log-item ${newLog.source}`;
      item.innerHTML = `
        <div class="log-cmd">${newLog.command}</div>
        <div class="log-meta">
          <span>${newLog.source === 'alexa' ? '🎙️ Alexa' : '🖥️ Painel'}</span>
          <span>${newLog.device_name}</span>
          <span>${new Date(newLog.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'})}</span>
        </div>`;
      if (el.querySelector('.empty-state')) el.innerHTML = '';
      el.prepend(item);

      // Atualiza contador
      const stat = document.getElementById('statCommands');
      stat.textContent = parseInt(stat.textContent || '0') + 1;
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'reminders' }, (payload) => {
      if (!allReminders.find(r => r.id === payload.new.id)) {
        allReminders.unshift(payload.new);
        renderReminders();
        if (payload.new.source === 'alexa') {
          showToast(`🎙️ Lembrete via Alexa: ${payload.new.title}`, 'info');
        }
      }
    })
    .subscribe((status) => {
      showStatus(status === 'SUBSCRIBED');
    });
}

// ============================================================
// UTILITÁRIOS
// ============================================================
function showStatus(online) {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className  = `status-dot ${online ? 'online' : 'offline'}`;
  text.textContent = online ? 'Conectado' : 'Sem conexão';
}

let toastTimer;
function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = type; }, 3000);
}
</script>
